apiVersion: v1
kind: ServiceAccount
metadata:
  name: greeting-etcd-controller
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: greeting-etcd-controller
rules:
  - apiGroups: ["greeting.example.com"]
    resources: ["greetings", "greetingcards", "greetingpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["greeting.example.com"]
    resources: ["greetings/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: greeting-etcd-controller
subjects:
  - kind: ServiceAccount
    name: greeting-etcd-controller
    namespace: default
roleRef:
  kind: ClusterRole
  name: greeting-etcd-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greeting-etcd-controller
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greeting-etcd-controller
  template:
    metadata:
      labels:
        app: greeting-etcd-controller
    spec:
      serviceAccountName: greeting-etcd-controller
      containers:
        - name: controller
          image: localhost/greeting-etcd-controller:latest
          imagePullPolicy: Never
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
