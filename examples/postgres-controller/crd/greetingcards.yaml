apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: greetingcards.greeting.example.com
spec:
  group: greeting.example.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [greetingName, message]
              properties:
                greetingName:
                  type: string
                  minLength: 1
                  description: Name of the parent Greeting.
                message:
                  type: string
                  minLength: 1
                  description: The greeting message.
      additionalPrinterColumns:
        - name: Greeting
          type: string
          jsonPath: .spec.greetingName
        - name: Message
          type: string
          jsonPath: .spec.message
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: greetingcards
    singular: greetingcard
    kind: GreetingCard
    shortNames: [gc]
