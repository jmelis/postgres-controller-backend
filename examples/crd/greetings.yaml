apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: greetings.greeting.example.com
spec:
  group: greeting.example.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  description: The name to greet.
            status:
              type: object
              properties:
                message:
                  type: string
                  description: The computed greeting message.
                phase:
                  type: string
                  enum: [Pending, Ready]
                  description: Lifecycle phase of the greeting.
                cardRef:
                  type: string
                  description: Name of the associated GreetingCard.
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Message
          type: string
          jsonPath: .status.message
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: greetings
    singular: greeting
    kind: Greeting
    shortNames: [greet]
