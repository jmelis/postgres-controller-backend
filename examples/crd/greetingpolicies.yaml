apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: greetingpolicies.greeting.example.com
spec:
  group: greeting.example.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [prefix]
              properties:
                prefix:
                  type: string
                  minLength: 1
                  description: The greeting prefix (e.g. "Hello", "Hola").
      additionalPrinterColumns:
        - name: Prefix
          type: string
          jsonPath: .spec.prefix
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: greetingpolicies
    singular: greetingpolicy
    kind: GreetingPolicy
    shortNames: [gp]
