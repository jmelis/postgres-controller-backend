apiVersion: batch/v1
kind: Job
metadata:
  name: pgctl-loadtest
  namespace: pgctl-loadtest
  labels:
    app.kubernetes.io/name: pgctl-loadtest
    app.kubernetes.io/component: harness
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 604800  # 7 days
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgctl-loadtest
        app.kubernetes.io/component: harness
    spec:
      serviceAccountName: pgctl-loadtest
      restartPolicy: Never
      containers:
        - name: loadtest
          image: pgctl-loadtest:latest  # Built from loadtest/Dockerfile
          args:
            - --spec=/config/spec.yaml
            - --metrics-addr=:9090
            - --report=/results/report.json
          env:
            - name: PGCTL_DSN
              valueFrom:
                secretKeyRef:
                  name: rds-dsn
                  key: dsn
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: spec
              mountPath: /config
              readOnly: true
            - name: results
              mountPath: /results
        - name: cloudwatch-agent
          image: public.ecr.aws/cloudwatch-agent/cloudwatch-agent:latest
          volumeMounts:
            - name: cwagent-config
              mountPath: /etc/cwagent
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: spec
          configMap:
            name: loadtest-spec
        - name: results
          emptyDir: {}
        - name: cwagent-config
          configMap:
            name: cloudwatch-agent-config
