apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudwatch-agent-config
  namespace: pgctl-loadtest
data:
  cwagentconfig.json: |
    {
      "logs": {
        "metrics_collected": {
          "prometheus": {
            "log_group_name": "pgctl-loadtest",
            "log_stream_name": "metrics",
            "prometheus_config_path": "/etc/cwagent/prometheus-config.yaml",
            "emf_processor": {
              "metric_namespace": "pgctl-loadtest",
              "metric_declaration": [
                {
                  "source_labels": ["job"],
                  "label_matcher": ".*",
                  "dimensions": [["bucket_id"], ["phase"], ["phase", "gvk"], ["phase", "error_type"]],
                  "metric_selectors": [
                    "^pgctl_writer_",
                    "^pgctl_watcher_",
                    "^pgctl_verifier_",
                    "^pgctl_lease_",
                    "^loadtest_"
                  ]
                }
              ]
            }
          }
        }
      }
    }
  prometheus-config.yaml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: pgctl-loadtest
        static_configs:
          - targets:
              - localhost:9090
