metadata:
  name: "ceiling-hunt"
  description: "Maximum RPS discovery — worker count sweep on db.m6g.xlarge Multi-AZ"

rds:
  instance_class: "db.m6g.2xlarge"
  engine_version: "16.14"

cluster:
  baseline_poll_interval: 5s
  debounce_floor: 100ms

seed:
  gvks:
    - gvk: "hypershift.openshift.io/v1beta1/HostedCluster"
      spec_size_bytes: 8192
      status_size_bytes: 12288
      metadata_size_bytes: 2048
      objects: 800

phases:
  phase0_baseline:
    enabled: false

  phase1_ceiling:
    enabled: true
    workers: 1
    duration: 120s
    warm_up: 15s
    runs: 1
    target_rps: 0
    target_p99_ms: 0
    worker_sweep: [64, 32, 16, 8, 4, 1]

  phase2_steady:
    enabled: false

  phase2b_skew:
    enabled: false

  phase3_avalanche:
    enabled: false

  phase5_poll:
    enabled: false

  phase6_failover:
    enabled: false

  phase7_backup_restore:
    enabled: false

verifier:
  enabled: true
  poll_interval: 200ms
  canary_interval: 1s

checkpoint_interval: 1m
