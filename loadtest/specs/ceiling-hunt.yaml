metadata:
  name: "ceiling-hunt"
  description: "Maximum RPS discovery — bucket count sweep on db.r6g.large"

rds:
  instance_class: "db.r6g.large"
  engine_version: "16.4"

cluster:
  buckets: 16
  lease_ttl: 120s
  baseline_poll_interval: 5s
  debounce_floor: 100ms

seed:
  gvks:
    - gvk: "hypershift.openshift.io/v1beta1/HostedCluster"
      spec_size_bytes: 8192
      status_size_bytes: 12288
      metadata_size_bytes: 2048
      objects_per_bucket: 50

phases:
  phase0_baseline:
    enabled: true
    ping_iterations: 1000
    write_iterations: 500
    stored_proc_writes: 500
    sync_commit_compare: 200

  phase1_ceiling:
    enabled: true
    workers_per_bucket: 1
    duration: 120s
    warm_up: 15s
    runs: 3
    target_rps: 0
    target_p99_ms: 0
    bucket_sweep: [1, 4, 8, 16, 32, 64]

  phase2_steady:
    enabled: false

  phase2b_skew:
    enabled: false

  phase3_avalanche:
    enabled: false

  phase5_poll:
    enabled: false

  phase6_failover:
    enabled: false

  phase7_backup_restore:
    enabled: false

verifier:
  enabled: true
  poll_interval: 200ms
  canary_interval: 1s
  sample_buckets: 4

checkpoint_interval: 1m
